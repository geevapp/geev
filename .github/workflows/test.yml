name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
      JWT_SECRET: test-secret-key
      NODE_ENV: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geev_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Create .env file for CI
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/geev_test" > .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/geev_test" > .env
          npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: pnpm run test:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always() && hashFiles('./app/coverage/coverage-final.json') != ''
        with:
          files: ./app/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
