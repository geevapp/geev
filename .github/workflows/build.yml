name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
      JWT_SECRET: test-secret-key
      NODE_ENV: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geev_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/geev_test" > .env
          npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
        run: npx prisma migrate deploy

      - name: Seed database with badges
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geev_test
        run: npx prisma db seed

      - name: Run ESLint
        run: pnpm run lint

      - name: Build Next.js application
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: app/.next
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: app/.next

      - name: Deploy to production
        run: |
          echo "Deployment step would go here"
          echo "Configure for your deployment target (Vercel, Netlify, AWS, etc.)"
